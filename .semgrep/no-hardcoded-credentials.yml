rules:
  - id: hardcoded-stripe-key
    message: |
      Clave de Stripe hardcodeada en el código fuente.
      Usar config('services.stripe.secret') leído desde .env (STRIPE_SECRET).
    severity: ERROR
    languages: [php]
    pattern-either:
      # Stripe::setApiKey("sk_live_...") o ("sk_test_...")
      - patterns:
          - pattern: \Stripe\Stripe::setApiKey($KEY)
          - metavariable-regex:
              metavariable: $KEY
              regex: '^"sk_(live|test)_[A-Za-z0-9]+"$'
      - patterns:
          - pattern: Stripe::setApiKey($KEY)
          - metavariable-regex:
              metavariable: $KEY
              regex: '^"sk_(live|test)_[A-Za-z0-9]+"$'
      # Asignación directa: $apiKey = "sk_live_..."
      - patterns:
          - pattern: $X = $V
          - metavariable-regex:
              metavariable: $V
              regex: '^"sk_(live|test)_[A-Za-z0-9]+"$'

  - id: hardcoded-bearer-token
    message: |
      Token Bearer hardcodeado. Mover a variable de entorno
      y leerlo con env('API_TOKEN') o config().
    severity: ERROR
    languages: [php]
    patterns:
      - pattern: $X = $V
      - metavariable-regex:
          metavariable: $V
          regex: '^"Bearer\s+[A-Za-z0-9._\-]{20,}"$'
